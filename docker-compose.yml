services:
  postgres:
    image: ankane/pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  lightpanda:
    image: lightpanda/browser:latest
    ports:
      - "9222:9222"

  tools-api:
    build:
      context: .
      dockerfile: core/Dockerfile.tools
    expose:
      - "9100"
    environment:
      WORKER_PORT: "9100"
    command: ["python", "sandbox/worker.py", "--port", "9100", "--sandbox-id", "docker-tools", "--session-id", "global"]

  agent-core:
    build:
      context: .
      dockerfile: core/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
      # Cache
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Browser
      LIGHTPANDA_CDP_URL: ws://lightpanda:9222
      # Tools sandbox
      TOOLS_API_URL: http://tools-api:9100
      # LLM / Embeddings — Ollama runs on the Docker host
      LLM_MODEL: qwen3-vl:8b
      EMBED_MODEL: mxbai-embed-large
      OLLAMA_HOST: http://host.docker.internal:11434
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  agent-ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8501:8501"
    environment:
      # Database (UI reads session history directly)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
      # Point UI at the backend service, not localhost
      CORE_API_URL: http://agent-core:8000
      CORE_WS_URL: ws://agent-core:8000/ws
      PYTHONPATH: /app
    depends_on:
      - agent-core
