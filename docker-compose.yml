services:
  postgres:
    image: ankane/pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agent_os"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  lightpanda:
    image: lightpanda/browser:latest
    ports:
      - "9222:9222"

  agent-core:
    build:
      context: .
      dockerfile: core/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - LIGHTPANDA_CDP_URL=ws://lightpanda:9222
      - TOOLS_API_URL=http://tools-api:9100
      - LLM_MODEL=qwen3-vl:8b
      - EMBED_MODEL=mxbai-embed-large
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  tools-api:
    build:
      context: .
      dockerfile: core/Dockerfile.tools
    expose:
      - "9100"
    environment:
      - WORKER_PORT=9100
    command: ["python", "sandbox/worker.py", "--port", "9100", "--sandbox-id", "docker-tools", "--session-id", "global"]

  agent-ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - AGENT_API_URL=http://agent-core:8000
    depends_on:
      - agent-core
