networks:
  agentos-public:
    driver: bridge # Phase 26: Public interface for UI/API access
  agentos-internal:
    driver: bridge
    internal: true # Phase 26: Air-Gapped Internal Data (No external gateway)

services:
  postgres:
    image: ankane/pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent -d agent_os" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentos-internal
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    secrets:
      - db_password

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agentos-internal

  tools-api:
    build:
      context: .
      dockerfile: agent_core/Dockerfile.tools
    ports:
      - "9101:9101"
    expose:
      - "9101"
    environment:
      WORKER_PORT: "9101"
      PYTHONPATH: /sandbox:/sandbox/dev
    volumes:
      - .:/sandbox:ro # Phase 24: Read-Only Source Mount
      - agentos-data:/data # Isolated Read-Write Data
    command: [ "python", "-u", "-m", "sandbox.worker", "--port", "9101", "--sandbox-id", "docker-tools", "--session-id", "global" ]
    networks:
      - agentos-internal

  agent-core:
    build:
      context: .
      dockerfile: agent_core/Dockerfile
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      TOOLS_API_URL: http://tools-api:9101
      LLM_MODEL: qwen3-vl:8b
      EMBED_MODEL: mxbai-embed-large
      OLLAMA_HOST: http://host.docker.internal:11434
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
    restart: always
    secrets:
      - db_password
    volumes:
      - .:/app:ro # Phase 24: Read-Only Source Mount
      - agentos-data:/data # Isolated Read-Write Data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
    networks:
      - agentos-public
      - agentos-internal

  agent-ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      CORE_API_URL: http://agent-core:8000
      CORE_WS_URL: ws://agent-core:8000/ws
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
    restart: always
    secrets:
      - db_password
    networks:
      - agentos-public
      - agentos-internal

  workers:
    build:
      context: .
      dockerfile: agent_core/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      LLM_MODEL: qwen3-vl:8b
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - .:/app:ro # Phase 24: Read-Only Source Mount
      - agentos-data:/data # Isolated Read-Write Data
    secrets:
      - db_password
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: [ "python", "dev/scripts/worker_manager.py" ]
    depends_on:
      agent-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: [ "CMD", "python", "dev/scripts/manage_workers.py", "status" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - agentos-internal

  # Sovereign Identity (Keycloak)
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: agent
      KC_DB_PASSWORD: agent_os_pw
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    secrets:
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentos-public
      - agentos-internal

volumes:
  pgdata:
  agentos-data: # Phase 24: Dedicated, isolated RW storage for artifacts/logs.

secrets:
  db_password:
    file: ./secrets/db_password.txt


