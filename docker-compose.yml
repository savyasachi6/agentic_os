networks:
  agentos-net:
    driver: bridge

services:
  postgres:
    image: ankane/pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent -d agent_os" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentos-net
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agentos-net

  lightpanda:
    image: lightpanda/browser:latest
    ports:
      - "9222:9222"
    networks:
      - agentos-net

  tools-api:
    build:
      context: .
      dockerfile: agent_core/Dockerfile.tools
    ports:
      - "9101:9101"
    expose:
      - "9101"
    environment:
      WORKER_PORT: "9101"
      PYTHONPATH: /sandbox:/sandbox/dev
    volumes:
      - .:/sandbox
    command: [ "python", "-u", "-m", "sandbox.worker", "--port", "9101", "--sandbox-id", "docker-tools", "--session-id", "global" ]
    networks:
      - agentos-net

  agent-core:
    build:
      context: .
      dockerfile: agent_core/Dockerfile
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LIGHTPANDA_CDP_URL: ws://lightpanda:9222
      TOOLS_API_URL: http://tools-api:9101
      RL_ROUTER_URL: http://rl-router:8100/rl
      LLM_MODEL: qwen3-vl:8b
      EMBED_MODEL: mxbai-embed-large
      OLLAMA_HOST: http://host.docker.internal:11434
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
    restart: always
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rl-router:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
    networks:
      - agentos-net

  rl-router:
    build:
      context: .
      dockerfile: rl_router/Dockerfile
    ports:
      - "8100:8100"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://localhost:8100/health\")'" ]
    restart: always
    networks:
      - agentos-net

  agent-ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
      CORE_API_URL: http://agent-core:8000
      CORE_WS_URL: ws://agent-core:8000/ws
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
    restart: always
    networks:
      - agentos-net

  workers:
    build:
      context: .
      dockerfile: agent_core/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      LLM_MODEL: qwen3-vl:8b
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: [ "python", "dev/scripts/worker_manager.py" ]
    depends_on:
      agent-core:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      # Use our status script to verify Redis heartbeats are present
      test: [ "CMD", "python", "dev/scripts/manage_workers.py", "status" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - agentos-net

  # Sovereign Identity (Keycloak)
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: agent
      KC_DB_PASSWORD: password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentos-net

volumes:
  pgdata:


