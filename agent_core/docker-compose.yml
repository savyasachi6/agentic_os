services:
  agent-app:
    build:
      context: ..
      dockerfile: core/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - TOOLS_API_URL=http://tools-api:9100
      - LLM_MODEL=qwen3-vl:8b
      - EMBED_MODEL=qwen:0.5b
      # Note: For Ollama to work locally within docker compose,
      # we assume you map the Ollama base URL or run Ollama on the host machine.
      # If running Ollama on host (mac/windows), use host.docker.internal:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Redis L0 cache — points to the redis service below
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_TTL_SECONDS=300
      - REDIS_ENABLED=true
    networks:
      - agent-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./skills:/app/skills
      - ./projects:/app/projects
      - ./certs:/app/certs

  tools-api:
    build:
      context: ..
      dockerfile: core/Dockerfile.tools
    expose:
      - "9100"
    environment:
      - WORKER_PORT=9100
    networks:
      - agent-net
    # Drop capabilities for security
    cap_drop:
      - ALL
    # Read-only root filesystem where possible
    read_only: true
    tmpfs:
      - /tmp
    command: [ "python", "sandbox/worker.py", "--port", "9100", "--sandbox-id", "docker-tools", "--session-id", "global" ]
    volumes:
      - ./projects:/sandbox/projects # Only mount allowable workspaces

  postgres:
    image: ankane/pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agent_os
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: password
    networks:
      - agent-net
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../agent_memory/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent -d agent_os" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - agent-net
    # Persist data across restarts with AOF (Append-Only File)
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  agent-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
